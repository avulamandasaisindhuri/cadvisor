name: Test
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        go-versions: ['1.25']
        platform: [ubuntu-24.04]
        environment-variables: [build/config/plain.sh, build/config/libpfm4.sh]
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Run presubmit checks
      run: |
        source ${{ matrix.environment-variables }}
        docker run --rm \
          --platform linux/s390x \
          -w /go/src/github.com/google/cadvisor \
          -v ${{ github.workspace }}:/go/src/github.com/google/cadvisor \
          -e GOTOOLCHAIN=auto \
          golang:${{ matrix.go-versions }}-bookworm \
          bash -c "
            git config --global safe.directory /go/src/github.com/google/cadvisor && \
            if [[ \"${BUILD_PACKAGES}\" != \"\" ]]; then \
              apt-get update && apt-get install -y ${BUILD_PACKAGES}; \
            fi && \
            make -e presubmit
          "
    - name: Run tests
      run: |
        source ${{ matrix.environment-variables }}
        docker run --rm \
          --platform linux/s390x \
          -w /go/src/github.com/google/cadvisor \
          -v ${{ github.workspace }}:/go/src/github.com/google/cadvisor \
          -e GO_FLAGS \
          golang:${{ matrix.go-versions }}-bookworm \
          bash -c "
            git config --global safe.directory /go/src/github.com/google/cadvisor && \
            go env GOARCH && \
            make test
          "
  test-integration:
    strategy:
      matrix:
        include:
          # bookworm: all environment configs
          - go-versions: '1.25'
            platform: ubuntu-24.04
            environment-variables: build/config/plain.sh
            debian-version: bookworm
          - go-versions: '1.25'
            platform: ubuntu-24.04
            environment-variables: build/config/libpfm4.sh
            debian-version: bookworm
          # trixie: only plain config
          - go-versions: '1.25'
            platform: ubuntu-24.04
            environment-variables: build/config/plain.sh
            debian-version: trixie
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Run integration tests
      env:
        GOLANG_VERSION: ${{ matrix.go-versions }}
        DEBIAN_VERSION: ${{ matrix.debian-version }}
      run: |
        set -ex
        source ${{ matrix.environment-variables }}
        make docker-test-integration
    - name: Upload cAdvisor log file
      uses: actions/upload-artifact@v6
      if: failure()
      with:
        name: cadvisor-${{ matrix.debian-version }}.log
        path: ${{ github.workspace }}/go/src/github.com/google/cadvisor/cadvisor.log
  test-integration-crio:
    strategy:
      matrix:
        go-versions: ['1.25']
        platform: [ubuntu-24.04]
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Run CRI-O integration tests
      env:
        GOLANG_VERSION: ${{ matrix.go-versions }}
      run: |
        set -ex
        source build/config/crio.sh
        make docker-test-integration-crio
    - name: Upload cAdvisor log file
      uses: actions/upload-artifact@v6
      if: failure()
      with:
        name: cadvisor-crio.log
        path: ${{ github.workspace }}/go/src/github.com/google/cadvisor/cadvisor.log
